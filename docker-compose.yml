services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.php
    working_dir: /workspace/php
    command: php -S 0.0.0.0:8080 -t public
    environment:
      APP_ENV: dev
      APP_BASE_PATH: /workspace/php
      DB_PATH: /workspace/php/storage/database.sqlite
      REGEX_DB_PATH: /workspace/db.json
      CRAWLER_ENDPOINT: http://crawler:3000/crawl
      CRAWLER_PROGRESS_ENDPOINT: http://app:8080/internal/crawl-progress
      CRAWLER_PROGRESS_TOKEN: dev-progress-token
      WORKER_IDLE_SLEEP_SECONDS: 20
    ports:
      - "8080:8080"
    volumes:
      - .:/workspace
    depends_on:
      - crawler
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.php
    working_dir: /workspace/php
    command: php bin/console worker:run
    environment:
      APP_ENV: dev
      APP_BASE_PATH: /workspace/php
      DB_PATH: /workspace/php/storage/database.sqlite
      REGEX_DB_PATH: /workspace/db.json
      CRAWLER_ENDPOINT: http://crawler:3000/crawl
      CRAWLER_PROGRESS_ENDPOINT: http://app:8080/internal/crawl-progress
      CRAWLER_PROGRESS_TOKEN: dev-progress-token
      WORKER_IDLE_SLEEP_SECONDS: 20
    volumes:
      - .:/workspace
    depends_on:
      - crawler
    restart: unless-stopped

  crawler:
    build:
      context: .
      dockerfile: Dockerfile.node
    environment:
      PORT: 3000
      CRAWLER_NAVIGATION_TIMEOUT_MS: 30000
      CRAWLER_MIN_REQUEST_INTERVAL_MS: 1000
      CRAWLER_DELAY_MIN_MS: 0
      CRAWLER_DELAY_MAX_MS: 0
      CRAWLER_MAX_BACKOFF_MS: 30000
      CRAWLER_PAGE_MAX_MS: 30000
      CRAWLER_HUMAN_ACTIONS_MIN: 2
      CRAWLER_HUMAN_ACTIONS_MAX: 6
      CRAWLER_HUMAN_DWELL_MIN_MS: 2000
      CRAWLER_HUMAN_DWELL_MAX_MS: 10000
    ports:
      - "3000:3000"
    restart: unless-stopped
