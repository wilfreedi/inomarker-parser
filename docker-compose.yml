services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.php
    working_dir: /workspace/php
    command:
      - sh
      - -lc
      - |
        if [ ! -f vendor/autoload.php ]; then
          composer install --no-interaction --prefer-dist --no-progress
        fi
        php -S 0.0.0.0:8080 -t public
    environment:
      APP_ENV: dev
      APP_BASE_PATH: /workspace/php
      DB_PATH: /workspace/php/storage/database.sqlite
      REGEX_DB_PATH: /workspace/db.json
      CRAWLER_ENDPOINT: http://crawler:3000/crawl
      CRAWLER_PROGRESS_ENDPOINT: http://app:8080/internal/crawl-progress
      CRAWLER_PROGRESS_TOKEN: dev-progress-token
      WORKER_IDLE_SLEEP_SECONDS: 20
    ports:
      - "8080:8080"
    volumes:
      - .:/workspace
    depends_on:
      - crawler
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.php
    working_dir: /workspace/php
    command:
      - sh
      - -lc
      - |
        if [ ! -f vendor/autoload.php ]; then
          composer install --no-interaction --prefer-dist --no-progress
        fi
        php bin/console worker:run
    environment:
      APP_ENV: dev
      APP_BASE_PATH: /workspace/php
      DB_PATH: /workspace/php/storage/database.sqlite
      REGEX_DB_PATH: /workspace/db.json
      CRAWLER_ENDPOINT: http://crawler:3000/crawl
      CRAWLER_PROGRESS_ENDPOINT: http://app:8080/internal/crawl-progress
      CRAWLER_PROGRESS_TOKEN: dev-progress-token
      WORKER_IDLE_SLEEP_SECONDS: 20
    volumes:
      - .:/workspace
    depends_on:
      - crawler
    restart: unless-stopped

  crawler:
    build:
      context: .
      dockerfile: Dockerfile.node
    environment:
      PORT: 3000
      CRAWLER_NAVIGATION_TIMEOUT_MS: 30000
      CRAWLER_MIN_REQUEST_INTERVAL_MS: 1000
      CRAWLER_DELAY_MIN_MS: 0
      CRAWLER_DELAY_MAX_MS: 0
      CRAWLER_MAX_BACKOFF_MS: 30000
      CRAWLER_PAGE_MAX_MS: 45000
      CRAWLER_PAGE_RECYCLE_EVERY: 60
      CRAWLER_HUMAN_ACTIONS_MIN: 3
      CRAWLER_HUMAN_ACTIONS_MAX: 8
      CRAWLER_HUMAN_DWELL_MIN_MS: 3000
      CRAWLER_HUMAN_DWELL_MAX_MS: 14000
      CRAWLER_DYNAMIC_SCROLL_ENABLED: 1
      CRAWLER_DYNAMIC_SCROLL_MAX_STEPS: 16
      CRAWLER_DYNAMIC_SCROLL_STABLE_STEPS: 3
      CRAWLER_DYNAMIC_SCROLL_PAUSE_MIN_MS: 700
      CRAWLER_DYNAMIC_SCROLL_PAUSE_MAX_MS: 1800
      CRAWLER_SITEMAP_ENABLED: 1
      CRAWLER_SITEMAP_MAX_FILES: 80
      CRAWLER_SITEMAP_MAX_DEPTH: 6
      CRAWLER_SITEMAP_MAX_URLS: 50000
      CRAWLER_SITEMAP_REQUEST_TIMEOUT_MS: 8000
      CRAWLER_SITEMAP_DISCOVERY_MAX_MS: 45000
    ports:
      - "3000:3000"
    restart: unless-stopped
